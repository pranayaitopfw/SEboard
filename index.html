<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Extension Board | MIT CSN</title>

<style>
body {
    text-align: center;
    font-family: 'Segoe UI', sans-serif;
    color: white;
    margin: 0;
    background: #050a14 url('bg.jpg') no-repeat center center fixed;
    background-size: cover;
}

.overlay {
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.5);
    z-index: -1;
}

header { margin-top: 30px; }

.logo-area {
    font-size: 42px;
    font-weight: bold;
    letter-spacing: 5px;
    text-shadow: 0 0 20px #7000ff, 0 0 30px #00d4ff;
}

h1 { font-size: 24px; }

.group-tag {
    display: inline-block;
    padding: 8px 25px;
    border-radius: 50px;
    border: 1.5px solid #00d4ff;
    color: #00eaff;
    font-size: 12px;
    letter-spacing: 2px;
    margin-top: 10px;
    text-transform: uppercase;
    box-shadow: 0 0 10px rgba(0,212,255,0.5),
                0 0 20px rgba(0,212,255,0.3);
    animation: glowPulse 2s infinite alternate;
}

@keyframes glowPulse {
    from { box-shadow: 0 0 5px #00d4ff; }
    to { box-shadow: 0 0 25px #00ffff; }
}

.status-bar {
    margin: 10px;
    color: #00ffcc;
    animation: pulse 1.5s infinite;
}

@keyframes pulse {
    0% { opacity: 0.5; }
    50% { opacity: 1; }
    100% { opacity: 0.5; }
}

.container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 20px;
    padding: 20px;
    max-width: 900px;
    margin: auto;
}

.switch {
    padding: 20px;
    border-radius: 20px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(15px);
    border: 1px solid rgba(255,255,255,0.1);
    transition: 0.3s;
}

.switch:hover {
    border: 1px solid rgba(0, 212, 255, 0.5);
    transform: translateY(-5px);
}

input {
    width: 80%;
    padding: 8px;
    margin-bottom: 10px;
    text-align: center;
    border-radius: 8px;
    border: none;
    background: rgba(0,0,0,0.3);
    color: #00d4ff;
}

button {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    transition: all 0.3s ease;
}

button:hover {
    transform: scale(1.05);
    box-shadow: 0 0 10px #00ffcc;
}

button:active { transform: scale(0.95); }

.on {
    background: linear-gradient(45deg, #00c853, #b2ff59);
    color: black;
    box-shadow: 0 0 15px #00ff88;
}

.off {
    background: rgba(255,255,255,0.1);
    color: #ff5252;
}

.data {
    font-size: 14px;
    margin-top: 10px;
}
</style>
</head>

<body>

<div class="overlay"></div>

<header>
    <div class="logo-area">MIT CSN</div>
    <h1>⚡ Smart Extension Board</h1>
    <p class="group-tag">GROUP FY K 02</p>
</header>

<div id="status" class="status-bar">🔄 Connecting...</div>

<div class="container">

<!-- 4 SOCKETS -->
<script>
for(let i=1;i<=4;i++){
document.write(`
<div class="switch">
    <input id="name${i}" onchange="saveName(${i})">
    <button id="btn${i}" class="off" onclick="toggle(${i})">OFF</button>
    <div class="data">
        ⚡ <span id="power${i}">0</span> W<br>
        🔌 <span id="current${i}">0</span> A<br>
        🔋 <span id="voltage${i}">0</span> V
    </div>
</div>
`);
}
</script>

</div>

<script>
const ESP_IP = "http://10.62.203.160"; // ← your ESP IP
// Load saved names
for (let i = 1; i <= 4; i++) {
    let saved = localStorage.getItem("name" + i);
    document.getElementById("name" + i).value = saved || ("Socket " + i);
}

function saveName(id) {
    localStorage.setItem("name" + id, document.getElementById("name" + id).value);
}

// Button UI update
function updateButton(btn, state) {
    btn.classList.remove("on", "off");
    btn.classList.add(state === "ON" ? "on" : "off");
    btn.innerHTML = state;
}

// Toggle switch
async function toggle(id) {
    let btn = document.getElementById("btn" + id);
    let newState = btn.innerHTML === "OFF" ? "ON" : "OFF";

    updateButton(btn, newState); // instant UI

    try {
        await fetch(`${ESP_IP}/switch${id}/${newState}`);
        document.getElementById("status").innerText = "✅ Connected";
    } catch {
        document.getElementById("status").innerText = "❌ ESP32 Offline";
    }
}

// Load status
async function loadStatus() {
    for (let i = 1; i <= 4; i++) {
        try {
            let res = await fetch(`${ESP_IP}/status${i}`);
            let state = await res.text();
            updateButton(document.getElementById("btn"+i), state);
        } catch {}
    }
}

// Load power data
async function loadConsumption() {
    for (let i = 1; i <= 4; i++) {
        try {
            let res = await fetch(`${ESP_IP}/data${i}`);
            let data = (await res.text()).split(",");
            
            if (data.length === 3) {
                let [v,c,p] = data;
                document.getElementById("voltage"+i).innerText = v;
                document.getElementById("current"+i).innerText = c;
                document.getElementById("power"+i).innerText = p;
            }
        } catch {}
    }
}

// Connection check
async function checkConnection() {
    try {
        await fetch(`${ESP_IP}/status1`);
        document.getElementById("status").innerText = "✅ Connected";
    } catch {
        document.getElementById("status").innerText = "❌ ESP32 Offline";
    }
}

// Init
window.onload = () => {
    loadStatus();
    loadConsumption();
};

// Auto refresh
setInterval(() => {
    loadStatus();
    loadConsumption();
    checkConnection();
}, 2000);

</script>

</body>
</html>
