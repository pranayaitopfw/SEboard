<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Extension Board</title>

<style>
body {
    text-align: center;
    font-family: 'Segoe UI', sans-serif;
    color: white;
    margin: 0;
    background: #050a14;
}

.container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 20px;
    padding: 20px;
    max-width: 900px;
    margin: auto;
}

.switch {
    padding: 20px;
    border-radius: 20px;
    background: rgba(255,255,255,0.05);
}

button {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
}

.on {
    background: #00e676;
    color: black;
}

.off {
    background: #333;
    color: red;
}
</style>
</head>

<body>

<h2>⚡ Smart Extension Board</h2>
<div id="status">🔄 Connecting...</div>

<div class="container" id="container"></div>

<script>
const ESP_IP = "http://10.62.203.160"; // ← your ESP IP

// Create UI
for (let i = 1; i <= 4; i++) {
    document.getElementById("container").innerHTML += `
    <div class="switch">
        <h3>Socket ${i}</h3>
        <button id="btn${i}" class="off" onclick="toggle(${i})">OFF</button>
        <p>Voltage: <span id="v${i}">0</span> V</p>
        <p>Current: <span id="c${i}">0</span> A</p>
        <p>Power: <span id="p${i}">0</span> W</p>
    </div>`;
}

// Update button UI
function updateButton(id, state) {
    let btn = document.getElementById("btn" + id);
    btn.className = (state === "ON") ? "on" : "off";
    btn.innerText = state;
}

// Toggle relay
async function toggle(id) {
    let btn = document.getElementById("btn" + id);
    let newState = btn.innerText === "OFF" ? "ON" : "OFF";

    updateButton(id, newState);

    try {
        await fetch(`${ESP_IP}/switch${id}/${newState}`, { cache: "no-store" });
        document.getElementById("status").innerText = "✅ Connected";
    } catch {
        document.getElementById("status").innerText = "❌ ESP32 Offline";
    }
}

// Load status
async function loadStatus() {
    for (let i = 1; i <= 4; i++) {
        try {
            let res = await fetch(`${ESP_IP}/status${i}`, { cache: "no-store" });
            let state = await res.text();
            updateButton(i, state);
        } catch {}
    }
}

// Load power data
async function loadData() {
    for (let i = 1; i <= 4; i++) {
        try {
            let res = await fetch(`${ESP_IP}/data${i}`, { cache: "no-store" });
            let [v,c,p] = (await res.text()).split(",");

            document.getElementById("v"+i).innerText = v;
            document.getElementById("c"+i).innerText = c;
            document.getElementById("p"+i).innerText = p;
        } catch {}
    }
}

// Check connection
async function checkConnection() {
    try {
        let res = await fetch(`${ESP_IP}/status1`, { cache: "no-store" });
        if (res.ok) {
            document.getElementById("status").innerText = "✅ Connected";
        }
    } catch {
        document.getElementById("status").innerText = "❌ ESP32 Offline";
    }
}

// Init
window.onload = () => {
    loadStatus();
    loadData();
};

// Auto refresh
setInterval(() => {
    loadStatus();
    loadData();
    checkConnection();
}, 2000);

</script>

</body>
</html>
