<!DOCTYPE html>
<html>
<head>
  <title>Smart Extension Board</title>
  <style>
    body {
      text-align: center;
      font-family: Arial;
      background: #121212;
      color: white;
    }
    .switch {
      margin: 20px;
    }
    button {
      padding: 15px 30px;
      font-size: 18px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
    }
    .on { background: green; }
    .off { background: red; }

    input {
      padding: 8px;
      margin-bottom: 10px;
      border-radius: 5px;
      border: none;
      text-align: center;
    }
  </style>
</head>
<body>

<h1>⚡ Smart Extension Board</h1>

<div class="switch">
  <input type="text" id="name1" value="Socket 1">
  <br>
  <button onclick="toggle(1)" id="btn1" class="off">OFF</button>
</div>

<div class="switch">
  <input type="text" id="name2" value="Socket 2">
  <br>
  <button onclick="toggle(2)" id="btn2" class="off">OFF</button>
</div>

<div class="switch">
  <input type="text" id="name3" value="Socket 3">
  <br>
  <button onclick="toggle(3)" id="btn3" class="off">OFF</button>
</div>

<div class="switch">
  <input type="text" id="name4" value="Socket 4">
  <br>
  <button onclick="toggle(4)" id="btn4" class="off">OFF</button>
</div>

<script>
  function toggle(id) {
    let btn = document.getElementById("btn" + id);

    if (btn.innerHTML === "OFF") {
      btn.innerHTML = "ON";
      btn.className = "on";
    } else {
      btn.innerHTML = "OFF";
      btn.className = "off";
    }
  }
</script>

</body>
</html>
