<!DOCTYPE html>
<html>
<head>
  <title>Smart Extension Board</title>

  <style>
    body {
  text-align: center;
  font-family: Arial;
  color: white;
  margin: 0;

  background: linear-gradient(-45deg, #0f2027, #203a43, #2c5364, #1c1c1c);
  background-size: 400% 400%;
  animation: gradientBG 12s ease infinite;
}

@keyframes gradientBG {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

h1 {
  margin: 20px;
  font-size: 22px;
}

.container {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 15px;
  padding: 10px;
}

.switch {
  padding: 15px;
  border-radius: 15px;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(10px);
}

input {
  padding: 8px;
  margin-bottom: 10px;
  border-radius: 5px;
  border: none;
  text-align: center;
  width: 100%;
  font-size: 14px;
}

button {
  padding: 12px;
  font-size: 16px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
  width: 100%;
  transition: 0.3s;
}

.on {
  background: #00c853;
  box-shadow: 0 0 15px #00c853;
}

.off {
  background: #d50000;
  box-shadow: 0 0 15px #d50000;
}

button:hover {
  transform: scale(1.05);
}
    }
  </style>

</head>
<body>

<h1>⚡ Smart Extension Board</h1>

<div class="container">

  <div class="switch">
    <input id="name1" onchange="saveName(1)">
    <button onclick="toggle(1)" id="btn1" class="off">OFF</button>
  </div>

  <div class="switch">
    <input id="name2" onchange="saveName(2)">
    <button onclick="toggle(2)" id="btn2" class="off">OFF</button>
  </div>

  <div class="switch">
    <input id="name3" onchange="saveName(3)">
    <button onclick="toggle(3)" id="btn3" class="off">OFF</button>
  </div>

  <div class="switch">
    <input id="name4" onchange="saveName(4)">
    <button onclick="toggle(4)" id="btn4" class="off">OFF</button>
  </div>

</div>

<script>
  const ESP_IP = "http://192.168.1.5"; // 🔥 CHANGE THIS

  // Load saved names
  for (let i = 1; i <= 4; i++) {
    let saved = localStorage.getItem("name" + i);
    document.getElementById("name" + i).value = saved || ("Socket " + i);
  }

  function saveName(id) {
    let value = document.getElementById("name" + id).value;
    localStorage.setItem("name" + id, value);
  }

  function toggle(id) {
    let btn = document.getElementById("btn" + id);
    let state = btn.innerHTML === "OFF" ? "on" : "off";

    fetch(`${ESP_IP}/switch${id}/${state}`)
      .then(() => {
        if (state === "on") {
          btn.innerHTML = "ON";
          btn.className = "on";
        } else {
          btn.innerHTML = "OFF";
          btn.className = "off";
        }
      })
      .catch(() => {
        alert("⚠️ ESP32 not connected");
      });
  }
</script>

</body>
</html>
